                    </div>
                    <span class="archetype-name">Воин</span>
                </button>
                <button class="archetype-btn" data-archetype="dinosaur">
                    <div class="archetype-icon">

        <!-- ЭКРАН 2: Имя и распределение очков -->
        <div id="screen-stats" class="screen">
            <h1 class="title">Характеристики</h1>
            <div class="form-group">
                <label for="hero-name">Имя героя</label>
                <input type="text" id="hero-name" placeholder="Введите имя..." maxlength="20" autocomplete="off">
            </div>
            <p class="subtitle">Распределите 5 очков</p>
            <div class="points-left">Осталось: <span id="points-remaining">5</span></div>
            <div class="stats-sliders">
                <div class="stat-row">
                    <label>Сила</label>
                    <input type="range" id="stat-strength" min="0" max="5" value="1" step="1">
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-row">
                    <label>Ловкость</label>
                    <input type="range" id="stat-agility" min="0" max="5" value="1" step="1">
                    <span class="stat-value">1</span>
                </div>
                <div class="stat-row">
                    <label>Интеллект</label>
                    <input type="range" id="stat-intelligence" min="0" max="5" value="1" step="1">
                    <span class="stat-value">1</span>
                </div>
            </div>
            <canvas id="radar-preview" width="250" height="250"></canvas>
            <button id="btn-start-quiz" class="primary-btn" disabled>Начать прокачку</button>
        </div>

        <!-- ЭКРАН 3: Квиз -->
        <div id="screen-quiz" class="screen">
            <div class="quiz-header">
                <div class="quiz-progress">Вопрос <span id="quiz-current">1</span>/15</div>
                <div class="quiz-timer-bar">
                    <div id="quiz-timer-fill" class="quiz-timer-fill"></div>
                </div>
            </div>
            <p id="quiz-question" class="quiz-question"></p>
            <div id="quiz-answers" class="quiz-answers"></div>
            <div id="quiz-feedback" class="quiz-feedback"></div>
        </div>

        <!-- ЭКРАН 4: Карточка героя + QR -->
        <div id="screen-card" class="screen">
            <h1 class="title">Ваш герой готов!</h1>
            <div class="hero-card">
                <div style="text-align: center;">
                    <span id="card-archetype-icon"></span>
                    <h2 id="card-name"></h2>
                </div>
                <canvas id="radar-final" width="220" height="220"></canvas>
                <div class="hero-card-stats">
                    <div class="hero-stat-bar">
                        <span>Сила</span>
                        <div class="bar-track">
                            <div id="bar-strength" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="hero-stat-bar">
                        <span>Ловкость</span>
                        <div class="bar-track">
                            <div id="bar-agility" class="bar-fill"></div>
                        </div>
                    </div>
                    <div class="hero-stat-bar">
                        <span>Интеллект</span>
                        <div class="bar-track">
                            <div id="bar-intelligence" class="bar-fill"></div>
                        </div>
                    </div>
                </div>
                <div class="quiz-result">
                    Правильных ответов: <span id="card-correct"></span>/15
                </div>
                <div id="qr-code" class="qr-code"></div>
                <p class="qr-hint">Покажите экран преподавателю</p>
            </div>
        </div>

    </div>
    <script src="./app.js"></script>
</body>

</html>
